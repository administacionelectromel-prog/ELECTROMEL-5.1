name: Compilar APK

# Se ejecuta al subir cambios al repo, o a mano desde la pestaña Actions.
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar Capacitor
        run: npm install

      - name: Preparar carpeta web (www)
        run: |
          mkdir -p www
          rsync -a \
            --exclude 'www' \
            --exclude 'android' \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.github' \
            ./ www/

      - name: Crear proyecto Android
        run: npx cap add android

      - name: Sincronizar web y plugins
        run: npx cap sync android

      - name: Versionar APK (7.4 + número de build)
        run: |
          sed -i 's/versionName "1.0"/versionName "7.4"/' android/app/build.gradle
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Compilar APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ELECTROMEL.apk

      - name: Guardar como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ELECTROMEL-apk
          path: ELECTROMEL.apk

      - name: Publicar como Release (descarga fácil desde el celular)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk
          name: "📱 ELECTROMEL — APK (última compilación)"
          body: "APK generado automáticamente desde el código del repo. Descargalo e instalalo (Android va a pedir permitir 'orígenes desconocidos'). Cada compilación reemplaza a la anterior."
          files: ELECTROMEL.apk
