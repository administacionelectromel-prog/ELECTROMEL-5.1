name: Compilar APK

# Se ejecuta al subir cambios al repo, o a mano desde la pestaña Actions.
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      VERSION: 2.0.${{ github.run_number }}
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar Capacitor
        run: npm install

      - name: Preparar carpeta web (www)
        run: |
          mkdir -p www
          rsync -a \
            --exclude 'www' \
            --exclude 'android' \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '*.md' \
            --exclude '.gitignore' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'capacitor.config.json' \
            ./ www/

      - name: Crear proyecto Android
        run: npx cap add android

      - name: Permisos nativos (cámara para QR y fotos)
        run: |
          M=android/app/src/main/AndroidManifest.xml
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />|' $M
          echo "Permisos en el Manifest:" && grep -c "uses-permission" $M

      - name: Ícono (logo ELECTROMEL) — sin dependencias externas
        run: |
          RES=android/app/src/main/res
          # Capacitor deja un ícono ADAPTATIVO (XML + capas) que TAPA el PNG.
          # Se borran esos XML/capas para que Android use nuestro logo.
          # El '|| true' evita que un borrado inexistente tumbe el paso.
          rm -rf "$RES/mipmap-anydpi-v26" || true
          find "$RES" -name 'ic_launcher_foreground.*' -delete 2>/dev/null || true
          find "$RES" -name 'ic_launcher_background.*' -delete 2>/dev/null || true
          # Copiar el ícono del TAMAÑO JUSTO para cada densidad (ya
          # generados en icons/). Nítido y sin ImageMagick.
          declare -A ICON=( [mdpi]=72 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "$RES/mipmap-$d"
            SRC="icons/icon-${ICON[$d]}.png"
            [ -f "$SRC" ] || SRC="icons/icon-512.png"
            cp "$SRC" "$RES/mipmap-$d/ic_launcher.png"
            cp "$SRC" "$RES/mipmap-$d/ic_launcher_round.png"
          done
          echo "Ícono aplicado. Contenido de mipmap-xxxhdpi:"
          ls "$RES/mipmap-xxxhdpi/" || true

      - name: Sincronizar web y plugins
        run: npx cap sync android

      - name: Versionar APK (2.0.N)
        run: |
          sed -i "s/versionName \"1.0\"/versionName \"${VERSION}\"/" android/app/build.gradle
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Compilar APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "ELECTROMEL-${VERSION}.apk"

      - name: Guardar como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ELECTROMEL-${{ env.VERSION }}
          path: ELECTROMEL-${{ env.VERSION }}.apk

      - name: Publicar como Release (descarga fácil desde el celular)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "📱 ELECTROMEL ${{ env.VERSION }}"
          make_latest: true
          body: "Descargá el APK e instalalo encima de la versión anterior (los datos se conservan). Todas las versiones quedan guardadas: si alguna diera problemas, volvé a instalar la anterior desde Releases."
          files: ELECTROMEL-${{ env.VERSION }}.apk
